<div class="flex flex-col items-center justify-between gap-3 border-t border-gray-100 px-4 py-3 sm:flex-row">

  <p class="text-sm text-gray-500">

    Page {{ pageNumber() }} of {{ totalPages() }}

    <span class="hidden sm:inline">

      ({{ totalCount() }} total)

    </span>

  </p>

  <div class="flex items-center gap-1">

    <button

      type="button"

      (click)="goTo(pageNumber() - 1)"

      [disabled]="pageNumber() === 1"

      class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-300 text-gray-500 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40">

      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>

      </svg>

    </button>

    @if (pages()[0] > 1) {

    <button

      type="button"

      (click)="goTo(1)"

      class="hidden h-8 w-8 items-center justify-center rounded-lg text-sm text-gray-500 transition hover:bg-gray-50 sm:flex">

      1

    </button>

    <span class="hidden text-gray-400 sm:inline">…</span>

    }

    @for (page of pages(); track page) {

    <button

      type="button"

      (click)="goTo(page)"

      class="flex h-8 w-8 items-center justify-center rounded-lg text-sm transition"

      [class.bg-blue-600]="page === pageNumber()"

      [class.text-white]="page === pageNumber()"

      [class.text-gray-600]="page !== pageNumber()"

      [class.hover:bg-gray-50]="page !== pageNumber()">

      {{ page }}

    </button>

    }

    @if (pages()[pages().length - 1] < totalPages()) {

    <span class="hidden text-gray-400 sm:inline">…</span>

    <button

      type="button"

      (click)="goTo(totalPages())"

      class="hidden h-8 w-8 items-center justify-center rounded-lg text-sm text-gray-500 transition hover:bg-gray-50 sm:flex">

      {{ totalPages() }}

    </button>

    }

    <button

      type="button"

      (click)="goTo(pageNumber() + 1)"

      [disabled]="pageNumber() === totalPages()"

      class="flex h-8 w-8 items-center justify-center rounded-lg border border-gray-300 text-gray-500 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-40">

      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>

      </svg>

    </button>

  </div>

</div>
