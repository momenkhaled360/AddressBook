<div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">

  <div class="mb-6 flex items-end justify-between">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Departments</h2>
      <p class="mt-1 text-sm text-gray-500">Manage address book departments</p>
    </div>
    <span class="rounded-full bg-blue-50 px-3 py-1 text-sm font-medium text-blue-600">
      {{ departments().length }} departments
    </span>
  </div>

  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    class="mb-6 flex gap-3">
    <input
      formControlName="name"
      placeholder="Department name"
      class="flex-1 rounded-xl border border-gray-300 px-4 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"/>

    <button
      type="submit"
      class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-blue-700 active:scale-95">
      {{ editingId ? 'Update' : 'Add' }}
    </button>

    @if (editingId) {
      <button
        type="button"
        (click)="cancelEdit()"
        class="rounded-xl border border-gray-300 px-4 py-2.5 text-sm text-gray-600 transition hover:bg-gray-50">
        Cancel
      </button>
    }
  </form>

  <!-- List -->
  <div class="space-y-3">
    @for (department of departments(); track department.id) {
      <div
        class="group flex items-center justify-between rounded-xl border border-gray-200 p-4 transition hover:border-gray-300 hover:shadow-sm">

        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-50 text-blue-600">
            <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9h.01M9 12h.01M9 15h.01"/>
            </svg>
          </div>
          <span class="font-medium text-gray-800">{{ department.name }}</span>
        </div>

        <div class="flex gap-2 opacity-0 transition group-hover:opacity-100">
          <button
            type="button"
            (click)="edit(department)"
            class="rounded-lg p-2 text-gray-400 transition hover:bg-blue-50 hover:text-blue-600">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button
            type="button"
            (click)="delete(department.id)"
            class="rounded-lg p-2 text-gray-400 transition hover:bg-red-50 hover:text-red-500">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>
    } @empty {
      <div class="flex flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 py-12 text-center">
        <svg class="mb-3 h-10 w-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/>
        </svg>
        <p class="text-sm text-gray-500">No departments yet</p>
      </div>
    }
  </div>

</div>
